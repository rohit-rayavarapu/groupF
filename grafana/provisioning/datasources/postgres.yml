apiVersion: 1

datasources:
  - name: PostgreSQL
    uid: postgres
    type: postgres
    access: proxy
    url: postgres:5432
    user: security_user
    secureJsonData:
      password: security_pass
    jsonData:
      database: security_db
      sslmode: disable
      postgresVersion: 1600
    isDefault: true
    editable: true